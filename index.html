<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Fortune Wheel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.5), 0 0 30px rgba(56, 189, 248, 0.2);
        }
        .wheel-container {
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .pointer {
            filter: drop-shadow(0 0 10px rgba(244, 63, 94, 0.8));
            z-index: 20;
        }
        /* Custom input focus effect */
        .input-focus:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 md:p-8">

    <div class="max-w-4xl w-full flex flex-col lg:flex-row items-center gap-12">
        
        <!-- Left: The Wheel -->
        <div class="relative flex-1 flex flex-col items-center">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="inline-block mb-3 px-3 py-1 bg-sky-500/20 border border-sky-500/40 rounded-full text-sky-400 text-[10px] font-bold uppercase tracking-widest">
                    SINGLE WINNER MODE (1명 추첨)
                </div>
                <h1 class="text-4xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-indigo-500">
                    LUCKY WHEEL
                </h1>
                <p class="text-slate-500 text-sm font-bold uppercase tracking-widest mt-1">행운의 주인공은 누구일까요?</p>
            </div>

            <!-- Pointer -->
            <div class="pointer absolute top-[-10px] left-1/2 -translate-x-1/2 w-8 h-10 flex justify-center">
                <svg viewBox="0 0 24 30" class="w-full h-full text-rose-500 fill-current">
                    <path d="M12 30L0 5C0 2.23858 2.23858 0 5 0H19C21.7614 0 24 2.23858 24 5L12 30Z" />
                </svg>
            </div>

            <!-- The Physical Wheel -->
            <div id="wheel-outer" class="relative w-[320px] h-[320px] md:w-[450px] md:h-[450px] rounded-full border-8 border-slate-800 p-2 neon-glow bg-slate-800 transition-all duration-500">
                <div id="wheel" class="wheel-container w-full h-full rounded-full overflow-hidden relative border-4 border-slate-900">
                    <!-- Canvas for Wheel Segments -->
                    <canvas id="wheelCanvas" class="w-full h-full"></canvas>
                </div>
                <!-- Center Decoration -->
                <div class="absolute inset-0 m-auto w-12 h-12 bg-slate-900 rounded-full border-4 border-sky-500 z-10 flex items-center justify-center shadow-lg">
                    <div class="w-2 h-2 bg-sky-400 rounded-full animate-ping"></div>
                </div>
            </div>

            <!-- Control Buttons -->
            <button id="spinBtn" class="mt-10 px-12 py-4 bg-sky-500 hover:bg-sky-400 text-white font-black text-xl rounded-2xl shadow-[0_0_25px_rgba(14,165,233,0.4)] transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                SPIN NOW!
            </button>
        </div>

        <!-- Right: Player Inputs -->
        <div class="w-full lg:w-80 space-y-4">
            <div class="p-6 rounded-3xl bg-slate-800/40 border border-slate-700/50 backdrop-blur-md">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <span class="w-2 h-2 bg-sky-400 rounded-full"></span>
                    참가자 목록 (5명 중 1명 당첨)
                </h2>
                <div id="inputGroup" class="space-y-3">
                    <!-- Inputs generated by JS -->
                </div>
            </div>

            <!-- Result Display -->
            <div id="resultBox" class="hidden p-8 rounded-3xl bg-gradient-to-br from-emerald-500/20 to-sky-500/20 border border-emerald-500/40 text-center shadow-[0_0_30px_rgba(16,185,129,0.2)]">
                <p class="text-xs font-bold text-emerald-400 uppercase tracking-widest mb-2 animate-pulse">🎉 최종 당첨자 탄생 🎉</p>
                <p id="winnerName" class="text-3xl font-black text-white drop-shadow-lg"></p>
                <button onclick="location.reload()" class="mt-4 text-[10px] text-slate-400 hover:text-white transition-colors underline decoration-slate-600">다시 설정하기</button>
            </div>
        </div>
    </div>

    <script>
        const colors = [
            '#0ea5e9', // Sky
            '#6366f1', // Indigo
            '#a855f7', // Purple
            '#ec4899', // Pink
            '#f43f5e'  // Rose
        ];
        
        let participants = ["참가자 1", "참가자 2", "참가자 3", "참가자 4", "참가자 5"];
        let currentRotation = 0;
        let isSpinning = false;

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const wheelEl = document.getElementById('wheel');
        const spinBtn = document.getElementById('spinBtn');
        const inputGroup = document.getElementById('inputGroup');
        const winnerNameText = document.getElementById('winnerName');
        const resultBox = document.getElementById('resultBox');

        // Audio Setup
        const tickSynth = new Tone.MembraneSynth({
            pitchDecay: 0.05,
            octaves: 10,
            oscillator: { type: 'sine' },
            envelope: { attack: 0.001, decay: 0.4, sustain: 0.01, release: 1.4 }
        }).toDestination();

        const winSynth = new Tone.PolySynth().toDestination();

        function drawWheel() {
            const size = canvas.width = canvas.height = 800;
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size / 2;
            const step = (Math.PI * 2) / participants.length;

            ctx.clearRect(0, 0, size, size);

            participants.forEach((name, i) => {
                const angle = i * step;
                
                // Draw Segment
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + step);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                
                // Draw Border
                ctx.strokeStyle = 'rgba(15, 23, 42, 0.3)';
                ctx.lineWidth = 4;
                ctx.stroke();

                // Draw Text
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + step / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 44px Inter";
                // Adjust text based on length
                const displayName = name.length > 6 ? name.substring(0, 5) + '..' : name;
                ctx.fillText(displayName, radius - 40, 15);
                ctx.restore();
            });
        }

        function createInputs() {
            inputGroup.innerHTML = '';
            participants.forEach((name, i) => {
                const div = document.createElement('div');
                div.className = "relative";
                div.innerHTML = `
                    <input type="text" value="${name}" data-index="${i}" 
                        class="w-full bg-slate-900/50 border border-slate-700/50 text-white px-4 py-3 rounded-xl text-sm input-focus transition-all"
                        placeholder="이름 입력...">
                    <div class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 rounded-full" style="background-color: ${colors[i % colors.length]}"></div>
                `;
                const input = div.querySelector('input');
                input.addEventListener('input', (e) => {
                    participants[i] = e.target.value || `참가자 ${i+1}`;
                    drawWheel();
                });
                inputGroup.appendChild(div);
            });
        }

        async function spin() {
            if (isSpinning) return;
            
            await Tone.start();
            isSpinning = true;
            spinBtn.disabled = true;
            resultBox.classList.add('hidden');
            document.getElementById('wheel-outer').style.boxShadow = "0 0 15px rgba(56, 189, 248, 0.5)";

            // Random rotation (at least 7 full spins for more suspense)
            const extraSpins = 7 + Math.floor(Math.random() * 5);
            const randomDegree = Math.floor(Math.random() * 360);
            const totalDegree = (extraSpins * 360) + randomDegree;
            
            currentRotation += totalDegree;
            wheelEl.style.transform = `rotate(-${currentRotation}deg)`;

            // Fake "ticking" sound based on rotation
            const segmentAngle = 360 / participants.length;
            let lastTick = 0;
            
            // We use a timer to simulate the ticker sound as it rotates
            const duration = 4000;
            const start = performance.now();
            
            const playTicks = (now) => {
                const elapsed = now - start;
                const progress = elapsed / duration;
                
                // Ease out cubic (matching the CSS transition)
                const easedProgress = 1 - Math.pow(1 - progress, 3);
                const currentAngle = easedProgress * totalDegree;
                
                if (Math.floor(currentAngle / segmentAngle) > lastTick) {
                    tickSynth.triggerAttackRelease("C2", "32n", undefined, 0.1);
                    lastTick = Math.floor(currentAngle / segmentAngle);
                }

                if (progress < 1) requestAnimationFrame(playTicks);
            };
            requestAnimationFrame(playTicks);

            // Wait for transition to end
            setTimeout(() => {
                isSpinning = false;
                spinBtn.disabled = false;
                
                // Calculate winner
                const actualDegree = currentRotation % 360;
                const segmentAngle = 360 / participants.length;
                const winnerIndex = Math.floor(actualDegree / segmentAngle);
                const finalIndex = (participants.length - winnerIndex) % participants.length;
                
                // Visual Highlight for completion
                document.getElementById('wheel-outer').style.boxShadow = "0 0 50px rgba(16, 185, 129, 0.6)";
                showWinner(participants[finalIndex]);
            }, duration);
        }

        function showWinner(name) {
            winnerNameText.innerText = name;
            resultBox.classList.remove('hidden');
            resultBox.classList.add('animate-bounce');
            
            // Celebration Sound
            winSynth.triggerAttackRelease(["C4", "E4", "G4", "B4"], "4n");
            setTimeout(() => winSynth.triggerAttackRelease(["D4", "F#4", "A4", "D5"], "2n"), 250);
        }

        function showWinner(name) {
            winnerNameText.innerText = name;
            resultBox.style.display = 'block';
            resultBox.classList.remove('hidden-el');
            
            // Celebration Sound
            winSynth.triggerAttackRelease(["C4", "E4", "G4"], "4n");
            setTimeout(() => winSynth.triggerAttackRelease(["F4", "A4", "C5"], "2n"), 200);
        }

        // Initialize
        window.onload = () => {
            drawWheel();
            createInputs();
        };

        spinBtn.addEventListener('click', spin);

    </script>
</body>
</html>
